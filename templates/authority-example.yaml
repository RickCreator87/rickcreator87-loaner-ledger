    - "1099-MISC"
  reporting_frequency: "annually"

metadata:
  created_at: "2026-01-15T14:30:00Z"
  updated_at: "2026-01-15T14:35:00Z"
  version: "1.0"
  tags:
    - "example"
    - "automated_grant"
    - "premium_tier"
  notes: "Example authority for demonstration purposes"

# Optional: Linked resources
linked_resources:
